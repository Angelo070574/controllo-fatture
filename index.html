<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#0b4f9c">

  <title>Registro Fatture</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="app">

    <header class="app-header">
      <div class="logo">✓</div>

      <div>
        <h1>Registro Fatture</h1>
        <p>Controllo prezzi e pagamenti</p>
      </div>
    </header>

   <section class="riepilogo">
  <div class="riquadro">
    <span>Fatture</span>
    <strong id="numeroFatture">0</strong>
  </div>

  <div class="riquadro">
    <span>Da pagare</span>
    <strong id="numeroDaPagare">0</strong>
  </div>

  <div class="riquadro">
    <span>Spese del mese</span>
    <strong id="totaleMese">€ 0,00</strong>
  </div>

  <div class="riquadro">
    <span>Spese dell’anno</span>
    <strong id="totaleAnno">€ 0,00</strong>
  </div>
</section>

    <section class="menu">

      <button class="pulsante principale" id="nuovaFattura">
        <span class="icona">＋</span>
        <span>
          <strong>Nuova fattura</strong>
          <small>Importa XML, PDF o foto</small>
        </span>
      </button>

      <button class="pulsante" id="archivio">
        <span class="icona">📁</span>
        <span>
          <strong>Archivio fatture</strong>
          <small>Cerca e controlla i documenti</small>
        </span>
      </button>

      <button class="pulsante" id="prezzi">
        <span class="icona">📈</span>
        <span>
          <strong>Controllo prezzi</strong>
          <small>Confronta gli aumenti dei prodotti</small>
        </span>
      </button>

      <button class="pulsante" id="pagamenti">
        <span class="icona">✓</span>
        <span>
          <strong>Pagamenti</strong>
          <small>Fatture pagate e non pagate</small>
        </span>
      </button>

    </section>

    <input
      type="file"
      id="selettoreFile"
      accept=".xml,.p7m,.pdf,image/*"
      hidden
    >

</button>
<section id="messaggio" class="messaggio nascosto"></section>
  </main>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
