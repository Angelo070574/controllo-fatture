<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controllo Fatture</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #d4af37;
      text-align: center;
    }

    header {
      padding: 30px 15px 15px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .subtitle {
      color: #ddd;
      margin-top: 8px;
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 18px;
      margin: 15px 0;
      border-radius: 12px;
      border: 1px solid #d4af37;
      background: #1c1c1c;
      color: #d4af37;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .button:active {
      background: #333;
    }

    .info {
      margin-top: 35px;
      padding: 18px;
      border: 1px solid #444;
      border-radius: 12px;
      color: #ccc;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <header>
    <h1>CONTROLLO FATTURE</h1>
    <div class="subtitle">Dolce e Goloso</div>
  </header>

  <div class="container">

    <button class="button">
      📄 Importa fattura
    </button>

    <button class="button">
      📚 Archivio fatture
    </button>

    <button class="button">
      💰 Controllo prezzi
    </button>

    <button class="button">
      ✅ Fatture pagate / da pagare
    </button>

    <div class="info">
      Qui costruiremo il sistema che leggerà le fatture,
      riconoscerà automaticamente fornitori, prodotti e prezzi
      e ci permetterà di controllare eventuali aumenti o errori.
    </div>

  </div>

</body>
</html>
